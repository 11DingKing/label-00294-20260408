version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: order_management_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_management
      MYSQL_USER: order_user
      MYSQL_PASSWORD: order_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: order_management_backend
    restart: always
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key-change-in-production
      - DB_NAME=order_management
      - DB_USER=order_user
      - DB_PASSWORD=order_pass
      - DB_HOST=db
      - DB_PORT=3306
    ports:
      - "8010:8000"
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: order_management_frontend
    restart: always
    ports:
      - "8091:8091"
    depends_on:
      - backend
    volumes:
      - ./frontend-admin:/app
      - /app/node_modules

volumes:
  mysql_data:
  backend_logs:
